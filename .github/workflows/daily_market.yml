name: daily-market

on:
  schedule:
    # 22:15 UTC is after the U.S. cash close in both EST and EDT.
    - cron: "15 22 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional ISO date (YYYY-MM-DD) to backfill."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-market-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Fetch data and generate fingerprint
        env:
          TARGET_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$TARGET_DATE" ]; then
            python scripts/daily_pipeline.py --date "$TARGET_DATE"
          else
            python scripts/daily_pipeline.py
          fi
      - name: Commit updated history and figure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.csv figures
          if git diff --staged --quiet; then
            echo "No market update to commit."
          else
            git commit -m "chore: daily market update $(date -u +%Y-%m-%d)"
            git push
          fi
